<!DOCTYPE html>
<html>

<head>
    <title>Simple Slider</title>
    <style>
        .slbox {
            width: 400px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
            background: white;
            border: 2px solid black;
        }

        img {
            width: 100%;
            height: 220px;
        }

        button {
            padding: 8px 20px;
            margin: 10px;
            border: none;
            background: black;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="slbox">
        <h2>Slider</h2>

        <img id="slimg" src="https://picsum.photos/id/10/500/300" alt="Image">

        <p id="text">Image 1 of 4</p>

        <button onclick="prev()">Prev</button>
        <button onclick="next()">Next</button>
    </div>

    <script>
        let images = [
            "https://picsum.photos/id/10/500/300",
            "https://picsum.photos/id/20/500/300",
            "https://picsum.photos/id/30/500/300",
            "https://picsum.photos/id/40/500/300"
        ];

        let index = 0;

        function show() {
            document.getElementById("slimg").src = images[index];
            document.getElementById("text").innerText = `Image ${index + 1} of ${images.length}`;
        }
        function next() {
            index++;   // next image

            // if index > last image → go back to 0
            if (index >= images.length) {
                index = 0;
            }

            show();
        }
        function prev() {
            index--;   // previous image

            // if index < 0 → go to last image
            if (index < 0) {
                index = images.length - 1;
            }

            show();
        }
    </script>

</body>

</html>
