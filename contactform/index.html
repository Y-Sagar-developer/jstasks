<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial;
            background: #424141;
            margin: 0;
        }

        .main {
            display: flex;
            width: 70%;
            background: white;
            margin: 40px auto;
            padding: 25px;
            border-radius: 5px;
        }

        .leftSide {
            width: 25%;
            border-right: 1px solid #ccc;
        }

        .leftSide h1 {
            margin-bottom: -11px;
        }

        .rightSide {
            width: 65%;
            padding-left: 26px;
        }

        .firstRow {
            display: flex;
            gap: 20px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 9px;
            margin-top: 15px;
            border: none;
            border-bottom: 1px solid #ccc;
            outline: none;
            font-size: 14px;
        }

        textarea {
            height: 68px;
        }

        .checkbox {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-top: 15px;
            font-size: 13px;
            align-items: center;

        }

        .checkbox input {
            width: auto
        }

        .captcha {
            margin-top: 20px;
            border: 1px solid #ccc;
            padding: 15px;
            width: 200px;

        }

        .submit-btn {
            margin-top: 20px;
            background: rgb(126, 27, 240);
            color: white;
            padding: 10px 25px;
            border: none;
            cursor: pointer;
        }

      
    </style>
</head>

<body>
    <div class="main">
        <div class="leftSide">
            <h1>Contact Us</h1>
            <p>let us know how we can help</p>

        </div>

        <div class="rightSide">
            <form onsubmit=" return handleSubmit()">

                <div class="firstRow">
                    <input type="text" placeholder="Name" required>
                    <input type="text" placeholder="Your Email Address" required>

                </div>
                <select required>
                    <option>Type of Inquiry</option>
                    <option>Support</option>
                    <option>General</option>

                </select>
                <input type="text" placeholder="Company">

                <select>
                    <option>India</option>
                    <option>USA</option>
                </select>
                <textarea placeholder="Your Message"></textarea>

                <div class="checkbox">
                    <input type="checkbox" id="agree" required>
                    <label for="agree">
                        By submitting this form, I understand that my data will be processed.
                    </label>
                </div>
                <div class="captcha">
                    ⬜ I'm not a robot
                </div>
                <button class="submit-btn">SUBMIT</button>


            </form>

        </div>
    </div>


    <script>
        function handleSubmit() {
            alert("Form submitted successfully");
            return false;
        }
    </script>

</body>

</html>
