<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Product Discount Calculator</title>
</head>

<body>
    <h2>Product Discount Calculator</h2>

    <label>Select Product</label>
    <select id="allproducts">
        <option value="300">Mouse</option>
        <option value="800">Keyboard</option>
        <option value="20000">Laptop</option>
    </select>

    <br><br>

    <label>Enter Discount </label>
    <input type="number" id="discountip" placeholder="Enter discount">

    <br><br>

    <button onclick="finalprice()">Get Final Price</button>

    <p id="originalprice"></p>
    <p id="totalamount"></p>

    <script>
        function finalprice() {
            let productprice = (document.getElementById("allproducts").value);
            let discountip = document.getElementById("discountip").value;

            if (productprice === "" || discountip === "") {
                alert("Please select product and enter discount");
                return;
            }

            productprice = Number(productprice);
            discountip = Number(discountip);

            let discountamount = (productprice * discountip) / 100;
            let final = productprice - discountamount;

            document.getElementById("originalprice").innerHTML =
                `Original Price: ${productprice}`;

            document.getElementById("totalamount").innerHTML =
                `Total Amount: ${final}`;
        }
    </script>

</body>

</html>
