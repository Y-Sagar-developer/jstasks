<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            text-align: center;
            background: rgb(201, 201, 196);
            font-family: Arial;
            margin-top: 200px;

        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        h3 {
            font-size: 24px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <h2> Dies Roller Simulator</h2>
    <button onclick="roller()">Roll Dies</button>
    <h3 id="result"></h3>


    <script>

        function roller() {

            let randomNum = Math.floor(Math.random() * 6) + 1;
            let diesEmojis = ["⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];

            let result = document.getElementById("result")
            result.innerHTML = `You rolled ${randomNum} ${diesEmojis[randomNum - 1]}`

            let r = Math.floor(Math.random() * 256);
            let g = Math.floor(Math.random() * 256);
            let b = Math.floor(Math.random() * 256);

            let randomColor = "rgb(" + r + "," + g + "," + b + ")";

            document.body.style.backgroundColor = randomColor;

        }

    </script>

</body>

</html>
